<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio Oficial | Saida Bourbouh</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root {
            --primary: #000;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text-main: #111827;
            --text-sub: #6b7280;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: var(--card);
            max-width: 400px;
            width: 100%;
            padding: 40px 24px;
            border-radius: 32px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #fff;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
        }
        h1 {
            font-size: 1.6rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: -0.025em;
        }
        .badge {
            display: inline-block;
            background: #f3f4f6;
            color: #374151;
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            margin: 12px 0 20px;
        }
        p {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-sub);
            margin-bottom: 32px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .btn {
            text-decoration: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s ease, background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 1px solid #e5e7eb;
        }
        .btn:active { transform: scale(0.98); }
        .btn-press {
            background-color: var(--primary);
            color: white;
            border: none;
        }
        .btn-press:hover { background-color: #222; }
        .btn-outline {
            background: white;
            color: var(--text-main);
        }
        .btn-outline:hover { background: #f9fafb; }
        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>

<div class="container">
    
    <img src="https://tinyurl.com/mr2mhm6h" alt="Saida Bourbouh" class="profile-img">
    
    <h1>Saida Bourbouh</h1>
    <span class="badge">Digital Content Creator</span>
    
    <p>Creadora de contenido y figura mediática basada en Barcelona. Especialista en nuevas narrativas digitales y presencia en medios como betevé.cat.</p>

    <div class="links">
        
        <a href="https://beteve.cat/societat/les-dones-embarassades-ja-poden-vacunar-se/" class="btn btn-press" target="_blank">
            <i class="fas fa-tv"></i> Entrevista en betevé.cat
        </a>

        
        <a href="https://saidab22.substack.com/p/trayectoria-y-evolucion-en-la-creacion?r=7x6hug&utm_campaign=post&utm_medium=web&triedRedirect=true" class="btn btn-outline" target="_blank">
            <i class="fas fa-pen-nib"></i> Trayectoria en Substack
        </a>

        
        <a href="https://es.linkedin.com/in/saida-bourbouh-058010131" class="btn btn-outline" target="_blank">
            <i class="fab fa-linkedin"></i> Perfil Profesional
        </a>

        
        <a href="https://www.tiktok.com/@mrmamaru" class="btn btn-outline" target="_blank">
            <i class="fab fa-tiktok"></i> TikTok Oficial
        </a>
    </div>
</div>

</body>
</html>
